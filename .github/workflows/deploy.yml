name: Deploy to Cloudflare

# Déploie automatiquement le site sur Cloudflare Workers à chaque merge sur main.
# Prérequis (à ajouter une seule fois dans GitHub → Settings → Secrets and
# variables → Actions) :
#   - CLOUDFLARE_API_TOKEN  : jeton Cloudflare avec la permission "Edit Cloudflare Workers"
#   - CLOUDFLARE_ACCOUNT_ID : l'ID de compte Cloudflare (Workers & Pages → barre latérale)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Le build (vite + @cloudflare/vite-plugin) génère la config de
      # déploiement dans dist/server/wrangler.json (main: index.js, assets: ../client).
      - name: Deploy
        run: bunx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
